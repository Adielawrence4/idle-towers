<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Idle Tower: Merchant Guard</title>
<script src="https://www.youtube.com/game_api/v1"></script>
<style>
  /* ----------------------------------------------------------------------
     Global reset: kill default margins/padding and any scrollbars so the
     Phaser canvas is the only thing visible, edge to edge, on every device.
  ---------------------------------------------------------------------- */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden; /* no scrollbars on desktop or mobile */
    background: #000000; /* pitch-black background behind/around the canvas */
    touch-action: none; /* prevent mobile pull-to-refresh / pinch-zoom gestures */
  }

  /* The container Phaser mounts into. Flex-centers the canvas so that on
     ultra-wide desktop monitors or oddly-cropped mobile viewports the game
     area always sits dead-center, with letterboxing on either side. */
  #game-container {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000000;
  }

  /* Phaser injects a <canvas> here. We force it to stay centered and never
     overflow its parent, while Phaser.Scale.RESIZE handles the actual
     internal resolution changes on orientation/viewport changes. */
  #game-container canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }
</style>
</head>
<body>

  <!-- Mount point for the Phaser game instance -->
  <div id="game-container"></div>

  <!--
    Script load order matters: each Scene class must be defined on the
    global scope BEFORE main.js runs, since main.js references
    MenuScene / GameplayScene / GameOverScene directly when building the
    Phaser.Game config object.
  -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="menuScene.js"></script>
  <script src="gameplayScene.js"></script>
  <script src="gameOverScene.js"></script>
  <script src="main.js"></script>

</body>
</html>
